<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up for Text Groups</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 20px;
    }
    .form-container {
      max-width: 400px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    .form-container h2 {
      margin-bottom: 20px;
    }
    h3 {
      font-size: 14px;
      color: #333;
      margin: 15px 0 10px;
      text-align: left;
    }
    .radio-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .radio-group label {
      font-size: 14px;
      cursor: pointer;
      background: #f1f1f1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    /* Simple highlight when radio is checked */
    .radio-group input[type="radio"]:checked + span {
      font-weight: bold;
    }
    .form-container input[type="tel"],
    .form-container button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    .form-container button {
      background-color: #1a472a;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }
    .form-container button:hover {
      background-color: #14521f;
    }
    .disclaimer {
      font-size: 12px;
      color: #555;
      margin-top: 15px;
      text-align: left;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Join a Text Group</h2>
    <form method="POST" action="https://manage.kmail-lists.com/subscriptions/subscribe" data-ajax-submit="https://manage.kmail-lists.com/ajax/subscriptions/subscribe">
      <input type="hidden" name="g" value="VBEnid">
      <input type="hidden" name="a" value="Ye2PfH">

      <h3>1. Select Your Site*</h3>
      <div class="radio-group">
        <label>
          <input type="radio" name="site_location" value="Arroyo Grande" required> Arroyo Grande
        </label>
        <label>
          <input type="radio" name="site_location" value="Santa Maria" required> Santa Maria
        </label>
      </div>

      <h3>2. Select Groups*</h3>
      <div class="radio-group">
        <label>
          <input type="radio" name="Select Groups 1" value="USYVL"> USYVL
        </label>
        <label>
          <input type="radio" name="Select Groups 1" value="Open Rec"> Open Rec
        </label>
        <label>
          <input type="radio" name="Select Groups 1" value="Both" checked="checked"> Both
        </label>
      </div>

      <h3 style="margin-bottom: 5px;">3. Phone Number*</h3>
      <input type="tel" name="phone_number" id="phone" required placeholder="Enter your phone number">

      <button type="submit">Subscribe</button>

      <p class="disclaimer">
        By submitting this form, you agree to receive text messages about practice schedules, updates, and important reminders. Msg & data rates may apply. You can unsubscribe at any time by replying STOP.
      </p>
    </form>
  </div>

</body>
</html>
