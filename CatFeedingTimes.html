<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Feeding Times</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    padding: 16px;
    background: #f5f5f5;
}
h1 {
    text-align: center;
    margin-bottom: 12px;
}
#tzInfo {
    text-align: center;
    font-size: 0.9em;
    opacity: 0.7;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 20px;
}
thead {
    background: #333;
    color: white;
}
th, td {
    border: 1px solid #ccc;
    padding: 12px;
    text-align: center;
}
tr:nth-child(even) {
    background: #fafafa;
}
.current-time-row td {
    font-weight: bold;
    background-color: #fffacd;
}
#weatherBox, #sunsetBox {
    margin-top: 18px;
    padding: 14px;
    background: white;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1.1em;
}
</style>
</head>

<body>

<h1>Cat Feeding Times</h1>
<div id="tzInfo"></div>

<table>
<thead>
<tr>
    <th>CA time</th>
    <th>Italy time</th>
    <th>Next Feeding</th>
</tr>
</thead>
<tbody id="timesBody"></tbody>
</table>

<div id="weatherBox">Loading Albenga weather…</div>
<div id="sunsetBox">Loading sunset time…</div>

<script>
// ============================================================
// EMBEDDED FEEDING TIMES (DEFINED IN CA TIME)
// ============================================================
const FEEDING_TIMES_CA = [
    "5:00 pm",
    "10:00 pm",
    "2:30 am",
    "7:00 am",
    "12:00 pm"
];

// ============================================================
// TIME ZONES
// ============================================================
const TZ_CA = "America/Los_Angeles";
const TZ_IT = "Europe/Rome";
const LOCAL_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

document.getElementById("tzInfo").textContent =
    `Detected device time zone: ${LOCAL_TZ}`;

// ============================================================
// UTILITIES
// ============================================================
function zonedNow(tz) {
    return new Date(
        new Intl.DateTimeFormat("en-US", {
            timeZone: tz,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
        }).format(new Date())
    );
}

function formatZonedTime(tz, withSeconds = false) {
    return new Intl.DateTimeFormat("en-US", {
        timeZone: tz,
        hour: "numeric",
        minute: "2-digit",
        second: withSeconds ? "2-digit" : undefined,
        hour12: true
    }).format(new Date());
}

function parseCaTime(line) {
    const m = line.match(/^(\d{1,2}):(\d{2})\s*([AP]M)$/i);
    if (!m) return null;

    let h = parseInt(m[1], 10);
    const min = parseInt(m[2], 10);
    const ap = m[3].toUpperCase();

    if (ap === "AM") {
        if (h === 12) h = 0;
    } else {
        if (h !== 12) h += 12;
    }
    return { h, min };
}

function formatAmPm(h24, m) {
    let h = h24 % 12;
    if (h === 0) h = 12;
    const mm = m.toString().padStart(2, "0");
    const ap = h24 >= 12 ? "PM" : "AM";
    return `${h}:${mm} ${ap}`;
}

// ============================================================
// BUILD TABLE
// ============================================================
let entries = [];
let caClockCell, itClockCell;
const tbody = document.getElementById("timesBody");

function buildTable() {
    tbody.innerHTML = "";
    entries = [];

    for (const t of FEEDING_TIMES_CA) {
        const p = parseCaTime(t);
        if (!p) continue;

        // Convert CA feeding time to Italy time correctly (DST aware)
        const nowCA = zonedNow(TZ_CA);
        nowCA.setHours(p.h, p.min, 0, 0);

        const itLabel = new Intl.DateTimeFormat("en-US", {
            timeZone: TZ_IT,
            hour: "numeric",
            minute: "2-digit",
            hour12: true
        }).format(nowCA);

        const itDate = zonedNow(TZ_IT);
        itDate.setHours(
            new Intl.DateTimeFormat("en-US", { timeZone: TZ_IT, hour: "numeric", hour12: false }).format(nowCA),
            new Intl.DateTimeFormat("en-US", { timeZone: TZ_IT, minute: "numeric" }).format(nowCA),
            0, 0
        );

        entries.push({
            caLabel: t.toUpperCase(),
            itLabel,
            itH: itDate.getHours(),
            itM: itDate.getMinutes(),
            cell: null,
            nextCell: null
        });
    }

    entries.sort((a, b) =>
        (a.itH * 60 + a.itM) - (b.itH * 60 + b.itM)
    );

    for (const e of entries) {
        const tr = document.createElement("tr");
        const td1 = document.createElement("td");
        const td2 = document.createElement("td");
        const td3 = document.createElement("td");

        td1.textContent = e.caLabel;
        td2.textContent = e.itLabel;

        tr.append(td1, td2, td3);
        tbody.appendChild(tr);

        e.cell = td2;
        e.nextCell = td3;
    }

    addClockRow();
}

function addClockRow() {
    const tr = document.createElement("tr");
    tr.className = "current-time-row";

    const tdCA = document.createElement("td");
    const tdIT = document.createElement("td");
    const tdEmpty = document.createElement("td");

    tr.append(tdCA, tdIT, tdEmpty);
    tbody.appendChild(tr);

    caClockCell = tdCA;
    itClockCell = tdIT;
}

// ============================================================
// UPDATE LOOP
// ============================================================
function updateAll() {
    const nowIT = zonedNow(TZ_IT);
    const nowMin = nowIT.getHours() * 60 + nowIT.getMinutes();

    caClockCell.textContent = formatZonedTime(TZ_CA, true);
    itClockCell.textContent = formatZonedTime(TZ_IT, true);

    let best = null;
    let bestDiff = Infinity;

    for (const e of entries) {
        e.cell.style.backgroundColor = "white";
        e.nextCell.textContent = "";

        let diff = (e.itH * 60 + e.itM) - nowMin;
        if (diff < 0) diff += 1440;

        if (diff < bestDiff) {
            bestDiff = diff;
            best = e;
        }
    }

    if (best) {
        let hrs = Math.floor(bestDiff / 60);
        let mins = bestDiff % 60;

        best.nextCell.textContent =
            hrs > 0 ? `${hrs} hr ${mins} min` : `${mins} min`;

        best.cell.style.backgroundColor = "#fffacd";
    }
}

// ============================================================
// WEATHER & SUNSET (ITALY LOCAL TIME)
// ============================================================
function fetchWeather() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=44.049&longitude=8.215&current_weather=true")
        .then(r => r.json())
        .then(d => {
            if (d.current_weather) {
                document.getElementById("weatherBox").textContent =
                    `Albenga Weather: ${d.current_weather.temperature}°C, Wind ${d.current_weather.windspeed} km/h`;
            }
        })
        .catch(() => document.getElementById("weatherBox").textContent = "Weather unavailable");
}

function fetchSunset() {
    fetch("https://api.sunrise-sunset.org/json?lat=44.049&lng=8.215&formatted=0")
        .then(r => r.json())
        .then(d => {
            if (d.status === "OK") {
                const sunsetUTC = new Date(d.results.sunset);
                const sunsetIT = new Intl.DateTimeFormat("en-US", {
                    timeZone: TZ_IT,
                    hour: "numeric",
                    minute: "2-digit",
                    hour12: true
                }).format(sunsetUTC);

                document.getElementById("sunsetBox").textContent =
                    `Sunset in Albenga: ${sunsetIT}`;
            }
        })
        .catch(() => document.getElementById("sunsetBox").textContent = "Sunset unavailable");
}

// ============================================================
// INIT
// ============================================================
buildTable();
fetchWeather();
fetchSunset();
setInterval(updateAll, 1000);
</script>

</body>
</html>
