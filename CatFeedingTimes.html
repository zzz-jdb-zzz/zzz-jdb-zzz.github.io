<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Feeding Times</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 16px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }
        thead {
            background: #333;
            color: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }
        tr:nth-child(even) {
            background: #fafafa;
        }
        .highlight-next {
            background-color: #fffacd;
        }
        .current-time-row td {
            font-weight: bold;
            background-color: #fffacd;
        }
    </style>
</head>
<body>

<h1>Cat Feeding Times</h1>

<table>
    <thead>
    <tr>
        <th>CA time</th>
        <th>Ital time</th>
        <th>Next Feeding</th>
    </tr>
    </thead>
    <tbody id="timesBody"></tbody>
</table>

<script>
//
//  EMBEDDED CAT FEEDING TIMES (CA TIME)
//
const embeddedTimes = [
  "5:00 pm",
  "10:00 pm",
  "2:30 am",
  "7:00 am",
  "12:00 pm"
];

let timeEntries = [];
let clockTimeCell = null;
const tbody = document.getElementById("timesBody");

window.addEventListener("load", () => {
    loadTimesFromArray(embeddedTimes);
    setInterval(updateAll, 1000);
});

//
// Parse and convert times
//
function loadTimesFromArray(lines) {
    timeEntries = [];
    tbody.innerHTML = "";

    for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;

        const parsed = parseTimeLine(line);
        if (!parsed) continue;

        let hour = parsed.hour;
        let minute = parsed.minute;

        // Convert CA → Italy (+9 hours)
        let totalMin = hour * 60 + minute + 9 * 60;
        totalMin %= (24 * 60);

        const italH = Math.floor(totalMin / 60);
        const italM = totalMin % 60;

        timeEntries.push({
            caLabel: formatAmPm(hour, minute),
            italLabel: formatAmPm(italH, italM),
            italH,
            italM,
            row: null,
            italCell: null,
            nextCell: null
        });
    }

    // sort by Italian time
    timeEntries.sort((a, b) =>
        a.italH * 60 + a.italM - (b.italH * 60 + b.italM)
    );

    // build rows
    for (const e of timeEntries) {
        const tr = document.createElement("tr");

        const td1 = document.createElement("td");
        td1.textContent = e.caLabel;

        const td2 = document.createElement("td");
        td2.textContent = e.italLabel;

        const td3 = document.createElement("td");

        tr.append(td1, td2, td3);
        tbody.appendChild(tr);

        e.row = tr;
        e.italCell = td2;
        e.nextCell = td3;
    }

    addClockRow();
    updateAll();
}

//
// Time parsing & formatting
//
function parseTimeLine(line) {
    const m = line.match(/^(\d{1,2}):(\d{2})\s*([aApP][mM])$/);
    if (!m) return null;

    let hour = parseInt(m[1], 10);
    const minute = parseInt(m[2], 10);
    const ampm = m[3].toUpperCase();

    if (ampm === "AM") {
        if (hour === 12) hour = 0;
    } else {
        if (hour !== 12) hour += 12;
    }

    return { hour, minute };
}

function formatAmPm(h24, m) {
    let h = h24 % 12;
    if (h === 0) h = 12;
    const mm = m.toString().padStart(2, "0");
    const ampm = h24 >= 12 ? "PM" : "AM";
    return `${h}:${mm} ${ampm}`;
}

function timeNowLabel() {
    const d = new Date();
    let h = d.getHours();
    let m = d.getMinutes();
    let s = d.getSeconds();

    let h12 = h % 12;
    if (h12 === 0) h12 = 12;
    const ampm = h >= 12 ? "PM" : "AM";

    return `${h12}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")} ${ampm}`;
}

//
// Clock row
//
function addClockRow() {
    const tr = document.createElement("tr");
    tr.classList.add("current-time-row");

    const td1 = document.createElement("td");
    const td2 = document.createElement("td");
    const td3 = document.createElement("td");

    tr.append(td1, td2, td3);
    tbody.appendChild(tr);

    clockTimeCell = td2;
}

//
// Update highlight & countdown
//
function updateAll() {
    const now = new Date();
    const nowTotal = now.getHours() * 60 + now.getMinutes();

    // update clock
    if (clockTimeCell)
        clockTimeCell.textContent = timeNowLabel();

    // clear
    for (const e of timeEntries) {
        e.italCell.style.backgroundColor = "white";
        e.nextCell.textContent = "";
    }

    // find next feeding (wrap-around fix using LET diff)
    let best = null;
    let bestDiff = Infinity;

    for (const e of timeEntries) {
        const total = e.italH * 60 + e.italM;
        let diff = total - nowTotal;  // <-- must be LET

        if (diff < 0) {
            diff += 24 * 60;
        }

        if (diff < bestDiff) {
            bestDiff = diff;
            best = e;
        }
    }

    if (best) {
        if (bestDiff > 0) {
            let hrs = Math.floor(bestDiff / 60);
            let mins = bestDiff % 60;

            if (hrs > 0) {
                best.nextCell.textContent = `${hrs} hr ${mins} min`;
            } else {
                best.nextCell.textContent = `${mins} min`;
            }
        }

        best.italCell.style.backgroundColor = "#fffacd";
    }
}
</script>

</body>
</html>
